# Public Parallax Hypr Drift config.
# Copy to ~/.config/parallax-hypr-drift/config.toml and adjust paths/apps.

mod_key = "super"
window_placement = "tile"
focus_follows_mouse = true

[input.keyboard]
layout = "gb"

[navigation]
friction = 0.94
animation_speed = 0.32
pan_step = 140.0

[zoom]
step = 1.12
fit_padding = 90.0
reset_on_new_window = false
reset_on_activation = true

[snap]
enabled = true
gap = 18.0
distance = 36.0
break_force = 44.0
same_edge = false
edge_center = true

[output]
view_mode = "independent"

[background]
type = "shader"
# Update this path after copying the shader to your config directory.
path = "/home/YOUR_USER/.config/parallax-hypr-drift/parallax_matrix_space.glsl"

[decorations]
default_mode = "minimal"

[keybindings]
"mod+return" = "exec kitty"
"mod+q" = "exec kitty"
"mod+c" = "close-window"
"mod+g" = "exec google-chrome-stable"
"mod+f" = "toggle-fullscreen"
"mod+v" = "toggle-floating"
"mod+o" = "workspace-overview-toggle"
"mod+ctrl+m" = "toggle-output-mirror"
"mod+w" = "zoom-to-fit"
"mod+equal" = "zoom-in"
"mod+minus" = "zoom-out"
"mod+0" = "zoom-reset"
"Print" = "spawn grim $HOME/Pictures/driftwm-$(date +%Y-%m-%d_%H-%M-%S).png"
"mod+p" = "spawn grim $HOME/Pictures/driftwm-$(date +%Y-%m-%d_%H-%M-%S).png"
"shift+Print" = "spawn grim -g \"$(slurp -d)\" $HOME/Pictures/driftwm-area-$(date +%Y-%m-%d_%H-%M-%S).png"
"mod+shift+p" = "spawn grim -g \"$(slurp -d)\" $HOME/Pictures/driftwm-area-$(date +%Y-%m-%d_%H-%M-%S).png"
"mod+ctrl+shift+q" = "quit"

[mouse.on-window]
"mod+left" = "move-window"
"mod+right" = "resize-window"
